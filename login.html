<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Wynncraft Database</title>
  
  <link rel="stylesheet" href="/output.css">

  <style>
    :root {
      --game-border: rgba(120, 68, 190, 0.7);
      --game-border-soft: rgba(120, 68, 190, 0.35);
      --game-text: #e8e4ef;
      --game-accent: #8f5fd8;
      --game-accent-strong: #a774ff;
    }

    body {
      background:
        radial-gradient(circle at 15% 15%, rgba(118, 63, 186, 0.14), transparent 36%),
        radial-gradient(circle at 85% 10%, rgba(44, 232, 255, 0.1), transparent 30%),
        linear-gradient(180deg, #1a1a1a 0%, #111 100%);
      color: var(--game-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }

    .hero-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .theme-panel {
      background: linear-gradient(180deg, rgba(39, 18, 57, 0.95), rgba(27, 12, 42, 0.95));
      border: 1px solid var(--game-border-soft);
      box-shadow: inset 0 0 0 1px rgba(73, 38, 102, 0.55);
    }

    .theme-btn-primary {
      background: linear-gradient(180deg, rgba(130, 75, 206, 0.95), rgba(96, 52, 165, 0.95));
      border: 1px solid rgba(180, 132, 255, 0.6);
      color: #fff;
    }

    .theme-btn-primary:hover {
      background: linear-gradient(180deg, rgba(147, 93, 224, 1), rgba(109, 62, 181, 1));
      border-color: rgba(200, 160, 255, 0.8);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col">
  
  <!-- Header -->
  <header class="bg-[rgba(22,22,22,0.98)] border-b border-[rgba(50,50,50,0.5)] sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <a href="/" class="flex items-center gap-3 cursor-pointer">
          <svg class="w-8 h-8 text-violet-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14.5 17.5L3 6V3h3l11.5 11.5M13 19l6-6M15 21l6-6M19 3l2 2-9.5 9.5-2-2L19 3z"/>
          </svg>
          <h1 class="text-xl font-bold text-white tracking-tight">Wynncraft Database</h1>
        </a>
      </div>
      <nav class="flex items-center gap-4">
        <a href="/item" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">Items</a>
        <a href="/guild" class="text-gray-400 hover:text-white transition-colors text-sm font-medium">Guilds</a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 container mx-auto px-4 py-16">
    <div class="max-w-md mx-auto">
      <div class="theme-panel p-8 rounded-xl">
        <h2 class="hero-title mb-6 text-center" id="authTitle">Login</h2>
        
        <div class="space-y-4">
          <div>
            <label class="text-gray-400 text-sm mb-1 block">Username</label>
            <input type="text" id="authUsername" class="w-full bg-[rgba(26,12,40,0.95)] border border-[rgba(143,95,216,0.45)] rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:border-violet-500 focus:outline-none" placeholder="Username">
          </div>
          <div>
            <label class="text-gray-400 text-sm mb-1 block">Password</label>
            <input type="password" id="authPassword" class="w-full bg-[rgba(26,12,40,0.95)] border border-[rgba(143,95,216,0.45)] rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:border-violet-500 focus:outline-none" placeholder="Password">
          </div>
          
          <button id="authSubmitBtn" class="theme-btn-primary w-full py-3 rounded-lg font-medium">Login</button>
          
          <div class="text-center">
            <span class="text-gray-500 text-sm" id="authSwitchText">Don't have an account?</span>
            <button id="authSwitchBtn" class="text-violet-400 text-sm ml-1 hover:underline">Register</button>
          </div>
          
          <p id="authError" class="text-red-400 text-sm text-center hidden"></p>
        </div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-[rgba(22,22,22,0.98)] border-t border-[rgba(50,50,50,0.5)] mt-auto">
    <div class="container mx-auto px-4 py-6 text-center">
      <p class="text-gray-500 text-sm">Not affiliated with Wynncraft Industries.</p>
    </div>
  </footer>

  <script type="module">
    const USER_API = '/api/user';

    function getCurrentUser() {
      try {
        return localStorage.getItem('currentUser');
      } catch {
        return null;
      }
    }

    function setCurrentUser(username) {
      localStorage.setItem('currentUser', username);
    }

    async function registerUser(username, password) {
      try {
        const response = await fetch(`${USER_API}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const result = await response.json();
        if (!response.ok) {
          throw new Error(result.error || 'Registration failed');
        }
        return result;
      } catch (e) {
        console.error('Register error:', e);
        throw e;
      }
    }

    async function loginUser(username, password) {
      try {
        const response = await fetch(`${USER_API}/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const result = await response.json();
        if (!response.ok) {
          throw new Error(result.error || 'Login failed');
        }
        return result;
      } catch (e) {
        console.error('Login error:', e);
        throw e;
      }
    }

    // Already logged in, redirect
    if (getCurrentUser()) {
      window.location.href = '/guild';
    }

    let isRegisterMode = false;

    const authTitle = document.getElementById('authTitle');
    const authUsername = document.getElementById('authUsername');
    const authPassword = document.getElementById('authPassword');
    const authSubmitBtn = document.getElementById('authSubmitBtn');
    const authSwitchBtn = document.getElementById('authSwitchBtn');
    const authError = document.getElementById('authError');
    const authSwitchText = document.getElementById('authSwitchText');

    function updateAuthUI() {
      authTitle.textContent = isRegisterMode ? 'Register' : 'Login';
      authSubmitBtn.textContent = isRegisterMode ? 'Register' : 'Login';
      authSwitchText.textContent = isRegisterMode ? 'Already have an account?' : "Don't have an account?";
      authSwitchBtn.textContent = isRegisterMode ? 'Login' : 'Register';
      authError.classList.add('hidden');
      authUsername.value = '';
      authPassword.value = '';
    }

    authSubmitBtn.addEventListener('click', async () => {
      const username = authUsername.value.trim();
      const password = authPassword.value;

      if (!username || !password) {
        authError.textContent = 'Please enter username and password';
        authError.classList.remove('hidden');
        return;
      }

      try {
        if (isRegisterMode) {
          await registerUser(username, password);
        }
        const result = await loginUser(username, password);
        setCurrentUser(result.username || username);
        if (result.passwordHash) {
          localStorage.setItem('userHash', result.passwordHash);
        }
        // Redirect back to guild
        window.location.href = '/guild';
      } catch (e) {
        authError.textContent = e.message;
        authError.classList.remove('hidden');
      }
    });

    authSwitchBtn.addEventListener('click', () => {
      isRegisterMode = !isRegisterMode;
      updateAuthUI();
    });
  </script>
</body>
</html>
