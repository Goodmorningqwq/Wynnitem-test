<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wynncraft Database</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'common': '#FFFFFF',
            'uncommon': '#22C55E',
            'rare': '#3B82F6',
            'epic': '#A855F7',
            'legendary': '#F97316',
            'fabled': '#EF4444',
            'mythic': '#EC4899',
          }
        }
      }
    }
  </script>
  
  <style>
    :root {
      --game-bg: rgba(20, 8, 30, 0.9);
      --game-border: rgba(120, 68, 190, 0.7);
      --game-border-soft: rgba(120, 68, 190, 0.35);
      --game-text: #e8e4ef;
      --game-accent: #8f5fd8;
      --game-accent-strong: #a774ff;
    }

    body {
      background:
        radial-gradient(circle at 15% 15%, rgba(118, 63, 186, 0.14), transparent 36%),
        radial-gradient(circle at 85% 10%, rgba(44, 232, 255, 0.1), transparent 30%),
        linear-gradient(180deg, #1a1a1a 0%, #111 100%);
      color: var(--game-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }

    .hero-title {
      font-size: 2.5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #818cf8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.02em;
    }

    .menu-card {
      background: linear-gradient(180deg, rgba(39, 18, 57, 0.95), rgba(27, 12, 42, 0.95));
      border: 1px solid var(--game-border-soft);
      box-shadow: inset 0 0 0 1px rgba(73, 38, 102, 0.55);
      transition: all 200ms ease;
    }

    .menu-card:hover {
      transform: translateY(-4px);
      border-color: var(--game-accent);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 30px rgba(143, 95, 216, 0.2);
    }

    .menu-card:active {
      transform: translateY(-2px) scale(0.98);
    }
  </style>
</head>
<body class="text-gray-100 min-h-screen flex flex-col">
  
  <!-- Header -->
  <header class="bg-[rgba(22,22,22,0.98)] border-b border-[rgba(50,50,50,0.5)] sticky top-0 z-50">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <svg class="w-8 h-8 text-violet-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14.5 17.5L3 6V3h3l11.5 11.5M13 19l6-6M15 21l6-6M19 3l2 2-9.5 9.5-2-2L19 3z"/>
        </svg>
        <h1 class="text-xl font-bold text-white tracking-tight">Wynncraft Database</h1>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="flex-1 container mx-auto px-4 py-16">
    <div class="max-w-3xl mx-auto">
      <!-- Hero -->
      <div class="text-center mb-12">
        <h2 class="hero-title mb-4">Welcome to Wynncraft Database</h2>
        <p class="text-gray-400 text-lg">Browse items, track guilds, and explore the Wynncraft world</p>
      </div>
      
      <!-- Menu Cards -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <!-- Items -->
        <a href="/item" class="menu-card p-8 rounded-xl text-center block">
          <div class="text-6xl mb-4">⚔️</div>
          <div class="text-2xl font-bold text-white mb-2">Items</div>
          <div class="text-gray-400">Browse weapons, armor, accessories and more</div>
        </a>
        
        <!-- Guilds -->
        <a href="/guild" class="menu-card p-8 rounded-xl text-center block">
          <div class="text-6xl mb-4">🏰</div>
          <div class="text-2xl font-bold text-white mb-2">Guilds</div>
          <div class="text-gray-400">Track guilds and monitor war events</div>
        </a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-[rgba(22,22,22,0.98)] border-t border-[rgba(50,50,50,0.5)] mt-auto">
    <div class="container mx-auto px-4 py-6 text-center">
      <p class="text-gray-500 text-sm">Not affiliated with Wynncraft Industries.</p>
    </div>
  </footer>
</body>
</html>
