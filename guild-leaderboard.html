<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guild Leaderboard - Wynncraft Database</title>
  <link rel="stylesheet" href="/output.css">
  <style>
    :root {
      --game-border-soft: rgba(120, 68, 190, 0.35);
      --game-text: #e8e4ef;
      --game-accent: #8f5fd8;
    }
    body {
      background:
        radial-gradient(circle at 15% 15%, rgba(118, 63, 186, 0.14), transparent 36%),
        radial-gradient(circle at 85% 10%, rgba(44, 232, 255, 0.1), transparent 30%),
        linear-gradient(180deg, #1a1a1a 0%, #111 100%);
      color: var(--game-text);
    }
    .theme-panel {
      background: linear-gradient(180deg, rgba(39, 18, 57, 0.95), rgba(27, 12, 42, 0.95));
      border: 1px solid var(--game-border-soft);
      box-shadow: inset 0 0 0 1px rgba(73, 38, 102, 0.55);
    }
    .theme-btn {
      background: linear-gradient(180deg, rgba(60, 60, 60, 0.95), rgba(45, 45, 45, 0.95));
      border: 1px solid rgba(80, 80, 80, 0.5);
      transition: all 180ms ease;
    }
    .theme-btn:hover {
      border-color: var(--game-accent);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="min-h-screen flex flex-col text-gray-100">
  <header class="bg-[rgba(22,22,22,0.98)] border-b border-[rgba(50,50,50,0.5)]">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/guild" class="text-white font-semibold">Guild Leaderboard</a>
      <button id="backToGuildBtn" class="theme-btn px-4 py-2 rounded-lg text-sm">Back to Guild</button>
    </div>
  </header>

  <main class="flex-1 container mx-auto px-4 py-8">
    <div class="max-w-4xl mx-auto space-y-4">
      <div class="theme-panel p-6 rounded-xl">
        <h2 class="text-xl font-bold text-white mb-2">Active Event Summary</h2>
        <div class="flex gap-2 mb-3">
          <input id="eventCodeInput" type="text" placeholder="Enter event code (e.g. A7K9Q2)" class="flex-1 bg-[rgba(26,12,40,0.95)] border border-[rgba(143,95,216,0.45)] rounded-lg px-3 py-2 text-white placeholder-gray-500 focus:border-violet-500 focus:outline-none">
          <button id="viewEventCodeBtn" class="theme-btn px-4 py-2 rounded-lg text-sm">View Event</button>
        </div>
        <p id="leaderboardMeta" class="text-sm text-gray-300">Loading...</p>
      </div>

      <div class="theme-panel p-6 rounded-xl">
        <div class="flex items-center justify-between mb-3">
          <h3 class="text-lg font-semibold text-white">Leaderboard</h3>
          <span id="leaderboardUpdatedAt" class="text-xs text-gray-400"></span>
        </div>
        <div id="leaderboardList" class="space-y-2">
          <p class="text-sm text-gray-500">Loading leaderboard...</p>
        </div>
      </div>
    </div>
  </main>

  <script type="module" src="/guild-leaderboard.js?v=20260329a"></script>
</body>
</html>
