<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guild Event History - Wynncraft Database</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --game-text: #e8e4ef;
    }
    body {
      background:
        radial-gradient(circle at 15% 15%, rgba(118, 63, 186, 0.14), transparent 36%),
        radial-gradient(circle at 85% 10%, rgba(44, 232, 255, 0.1), transparent 30%),
        linear-gradient(180deg, #1a1a1a 0%, #111 100%);
      color: var(--game-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }
    .theme-panel {
      background: linear-gradient(180deg, rgba(39, 18, 57, 0.95), rgba(27, 12, 42, 0.95));
      border: 1px solid rgba(120, 68, 190, 0.35);
      box-shadow: inset 0 0 0 1px rgba(73, 38, 102, 0.55);
    }
    .theme-btn {
      background: linear-gradient(180deg, rgba(60, 60, 60, 0.95), rgba(45, 45, 45, 0.95));
      border: 1px solid rgba(80, 80, 80, 0.5);
      color: var(--game-text);
      transition: all 180ms ease;
    }
    .theme-btn:hover {
      border-color: rgba(143, 95, 216, 1);
      transform: translateY(-2px);
    }
  </style>
</head>
<body class="min-h-screen text-gray-100">
  <main class="container mx-auto px-4 py-8">
    <div class="max-w-4xl mx-auto">
      <div class="flex items-center justify-between mb-4">
        <h1 class="text-2xl font-bold text-white">Guild Event History</h1>
        <button id="backToGuildBtn" class="theme-btn px-4 py-2 rounded-lg text-sm">Back to Dashboard</button>
      </div>
      <div class="theme-panel p-6 rounded-xl">
        <p class="text-gray-400 text-sm mb-4">Recent tracked events for your account.</p>
        <div id="eventHistoryList" class="space-y-2">
          <p class="text-gray-500 text-sm text-center py-4">Loading event history...</p>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="/guild-event-history.js"></script>
</body>
</html>
